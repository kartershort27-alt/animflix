name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'library.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/css
          cp -r js  _site/js
          cp library.json _site/library.json

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
